<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opticore PC - Performance Redefined</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            /* Hiệu ứng Gradient nền giống trong ảnh */
            background: linear-gradient(135deg, #ff0080, #ffcc33, #00d2ff, #3a7bd5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            overflow: hidden;
        }

        /* Hiệu ứng chuyển động cho nền */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Thanh Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.2); /* Làm mờ thanh menu */
            backdrop-filter: blur(10px);
        }

        .logo {
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 2px;
            color: #fff;
        }

        .logo span {
            color: #00d2ff;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            font-size: 13px;
            font-weight: 700;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #fff;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 80px;
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0px 10px 30px rgba(0,0,0,0.1);
        }

        .sub-h1 {
            font-size: 70px;
            color: #00b4ff; /* Màu xanh neon */
            margin-bottom: 30px;
        }

        p {
            font-size: 18px;
            max-width: 700px;
            line-height: 1.6;
            color: rgba(0, 0, 0, 0.6); /* Chữ hơi mờ màu tối như ảnh */
            font-weight: 500;
            font-style: italic;
        }

        /* Nút Discord */
        .btn-discord {
            margin-top: 40px;
            background: #00a8ff;
            color: black;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0, 168, 255, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-discord:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0, 168, 255, 0.6);
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            h1 { font-size: 40px; }
            .sub-h1 { font-size: 35px; }
            nav { padding: 20px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">OPTICORE <span>PC</span></div>
        <div class="nav-links">
            <a href="#">Features</a>
            <a href="#">How to join</a>
            <a href="#">Discord</a>
        </div>
    </nav>

    <main>
        <h1>PERFORMANCE</h1>
        <h1 class="sub-h1">REDEFINED</h1>
        
        <p>"Nâng tầm sức mạnh phần cứng, tối ưu hóa mọi khung hình.<br>
        Đẳng cấp của một Pro-Gamer bắt đầu từ sự mượt mà."</p>

        <a href="https://discord.gg/yourlink" class="btn-discord">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.069.069 0 0 0-.032.027C.533 9.048-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.086 2.157 2.419 0 1.334-.956 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.086 2.157 2.419 0 1.334-.946 2.419-2.157 2.419z"/></svg>
            TRUY CẬP DISCORD NGAY
        </a>
    </main>

</body>
</html>
