<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opticore PC - Performance Redefined</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #ff0080, #ffcc33, #00d2ff, #3a7bd5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
        }

        .logo {
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 2px;
        }

        .logo span { color: #00d2ff; }

        .nav-links { display: flex; gap: 30px; }

        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            font-size: 13px;
            font-weight: 700;
            transition: 0.3s;
        }

        .nav-links a:hover { color: #fff; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: clamp(40px, 8vw, 80px);
            font-weight: 900;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .sub-h1 {
            color: #00b4ff;
            margin-bottom: 25px;
        }

        p {
            font-size: 18px;
            max-width: 700px;
            line-height: 1.6;
            color: rgba(0, 0, 0, 0.6);
            font-weight: 600;
            font-style: italic;
        }

        .btn-discord {
            margin-top: 40px;
            background: #00a8ff;
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(0, 168, 255, 0.3);
            transition: all 0.3s ease;
        }

        .btn-discord:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 168, 255, 0.5);
            background: #00c3ff;
        }

        .btn-discord img {
            width: 20px;
            filter: brightness(0) invert(1); /* Chuyển icon sang màu trắng cho nổi */
        }

        @media (max-width: 768px) {
            nav { padding: 20px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">OPTICORE <span>PC</span></div>
        <div class="nav-links">
            <a href="#">Features</a>
            <a href="#">How to join</a>
            <a href="#">Discord</a>
        </div>
    </nav>

    <main>
        <h1>PERFORMANCE</h1>
        <h1 class="sub-h1">REDEFINED</h1>
        
        <p>"Nâng tầm sức mạnh phần cứng, tối ưu hóa mọi khung hình.<br>
        Đẳng cấp của một Pro-Gamer bắt đầu từ sự mượt mà."</p>

        <a href="#" target="_blank" class="btn-discord">
            <img src="https://cdn.prod.website-files.com/6257adef93867e3d1820e252/6257adef93867e734220e324_discord-icon.svg" alt="Discord">
            TRUY CẬP DISCORD NGAY
        </a>
    </main>

</body>
</html>
