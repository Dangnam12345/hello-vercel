<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptiCore PC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Orbitron, sans-serif;
    color: white;
    background: #0f172a;
}

/* NAVBAR */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 60px;
    background: rgba(0,0,0,0.4);
}

.nav a {
    color: white;
    text-decoration: none;
    margin-left: 30px;
    font-size: 14px;
    opacity: 0.8;
}

/* HERO */
.hero {
    height: 90vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    background: linear-gradient(120deg,
        #ff3cac,
        #784ba0,
        #2b86c5);
}

.hero h1 {
    font-size: 70px;
    margin: 0;
    opacity: 0.85;
}

.hero h2 {
    font-size: 60px;
    color: #00d4ff;
    margin-top: 10px;
}

.hero p {
    opacity: 0.7;
    margin-top: 20px;
    text-align: center;
    max-width: 600px;
}

.btn {
    margin-top: 35px;
    padding: 15px 40px;
    border-radius: 40px;
    background: #00bfff;
    color: black;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="nav">
    <div><b>OPTICORE PC</b></div>
    <div>
        <a href="#">FEATURES</a>
        <a href="#">HOW TO JOIN</a>
        <a href="#">DISCORD</a>
    </div>
</div>

<section class="hero">
    <h1>PERFORMANCE</h1>
    <h2>REDEFINED</h2>
    <p>
        Nâng tầm sức mạnh phần cứng, tối ưu hóa mọi khung hình.
        Đẳng cấp của một Pro-Gamer bắt đầu từ sự mượt mà.
    </p>

    <a href="#" class="btn">TRUY CẬP DISCORD NGAY</a>
</section>

</body>
</html>
